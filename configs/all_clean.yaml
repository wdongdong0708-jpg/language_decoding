manifest: data/manifests/littleprince_pl_all_clean_manifest.csv
batch_size: 128
max_samples: 1300
num_workers: 0
normalize_eeg: true
seed: 42

model:
  in_channels: 128
  hidden_channels: 128
  embedding_dim: 768
  dropout: 0.1

train:
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.0001
  val_fraction: 0.1
  contrastive_temperature: 0.07
